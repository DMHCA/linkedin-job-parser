name: CI/CD - Build, Test, Push Docker Image and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build project and run tests
        run: ./mvnw clean verify

      - name: Get project version
        id: get_version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t linkedin-job-parser:${{ env.VERSION }} .
          docker tag linkedin-job-parser:${{ env.VERSION }} \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/linkedin-job-parser:${{ env.VERSION }}
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/linkedin-job-parser:${{ env.VERSION }}

  deploy:
    name: Deploy to EC2 if version changed
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/linkedin-job-parser

            if [ -f last_version ]; then
              LAST=$(cat last_version)
            else
              LAST=""
            fi

            NEW="${{ needs.build-and-push.outputs.version }}"

            if [ "$NEW" != "$LAST" ]; then
              echo "Version changed ($LAST -> $NEW). Deploying..."

              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login \
                --username AWS \
                --password-stdin \
                ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

              docker pull \
                ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/linkedin-job-parser:$NEW
            
              export APP_VERSION=$NEW
              docker compose down
              docker compose up -d

              echo "$NEW" > last_version
            else
              echo "Version not changed ($NEW). Skipping deploy."
            fi