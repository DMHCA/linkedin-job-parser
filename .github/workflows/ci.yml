name: CI - Build, Test and Push Docker Image to AWS ECR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build Spring Boot App and Push Docker Image
    runs-on: ubuntu-latest

    steps:

      # Step 1 - Checkout repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 - Install JDK 21 with Maven cache
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Step 3 - Make Maven wrapper executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Start Docker
        run: sudo systemctl start docker

      # Step 4 - Build project and run unit tests
      - name: Build project and run tests
        run: ./mvnw clean verify

      # Step 5 - Read project version from pom.xml
      - name: Extract project version
        id: project_version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Step 6 - Configure AWS credentials using GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 7 - Authenticate Docker to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Step 8 - Build Docker image with version tag
      - name: Build Docker image
        run: |
          docker build -t linkedin-job-parser:$VERSION .

      # Step 9 - Tag Docker image for AWS ECR repository
      - name: Tag Docker image
        run: |
          docker tag linkedin-job-parser:$VERSION \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/linkedin-job-parser:$VERSION

      # Step 10 - Push Docker image to Amazon ECR
      - name: Push Docker image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/linkedin-job-parser:$VERSION